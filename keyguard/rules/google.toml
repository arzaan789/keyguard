[[rules]]
id = "google-api-key"
description = "Google API Key (AIza prefix) — may grant Gemini/Maps/Firebase access"
pattern = "AIza[0-9A-Za-z\\-_]{35}"
entropy_min = 4.2
severity = "critical"
tags = ["google", "gemini", "maps", "firebase"]

[[rules]]
id = "gcp-service-account-key"
description = "GCP Service Account RSA private key"
pattern = "-----BEGIN RSA PRIVATE KEY-----"
entropy_min = 0.0
severity = "critical"
tags = ["google", "gcp", "service-account"]

[[rules]]
id = "google-oauth-client-secret"
description = "Google OAuth2 Client Secret (GOCSPX prefix)"
pattern = "GOCSPX-[0-9A-Za-z\\-_]{28}"
entropy_min = 4.0
severity = "critical"
tags = ["google", "oauth"]
